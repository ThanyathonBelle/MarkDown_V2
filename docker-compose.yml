services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: markdown_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d markdown_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/markdown_ai
      OPENAI_API_BASE: ${OPENAI_API_BASE:-${LLM_BASE_URL:-http://h200-server:8000/v1}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${LLM_API_KEY:-}}
      MODEL_NAME: ${MODEL_NAME:-${LLM_MODEL:-your-model-name}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      VECTOR_DB_URL: ${VECTOR_DB_URL:-http://qdrant:6333}
      VECTOR_COLLECTION_NAME: ${VECTOR_COLLECTION_NAME:-tor_chunks}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
